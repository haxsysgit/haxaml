# acts.yaml JSON Schema — Project Acts (FRAME model: A)
# What has been done, what's active, compressed project memory.
# Version: 0.2.0

$schema: "https://json-schema.org/draft/2020-12/schema"
title: "Haxaml Acts"
description: "Live project state — tasks, runs, decisions, history."
type: object

required:
  - current_phase
  - active_task

properties:

  current_phase:
    type: string
    description: "The project phase currently in progress."

  active_task:
    type: object
    description: "The single task being worked on right now."
    required: [name]
    properties:
      name:
        type: string
      description:
        type: string
      started:
        type: string
        format: date-time
      assignee:
        type: string

  completed_tasks:
    type: array
    items:
      type: object
      required: [name, result]
      properties:
        name:
          type: string
        result:
          type: string
          enum: [success, partial, failed]
        summary:
          type: string
        completed:
          type: string
          format: date-time

  blocked_tasks:
    type: array
    items:
      type: object
      required: [name, reason]
      properties:
        name:
          type: string
        reason:
          type: string
        depends_on:
          type: string

  decisions:
    type: array
    items:
      type: object
      required: [decision, reasoning]
      properties:
        decision:
          type: string
        reasoning:
          type: string
        date:
          type: string
          format: date-time
        reversible:
          type: boolean
          default: true

  unresolved_dependencies:
    type: array
    items:
      type: object
      required: [item]
      properties:
        item:
          type: string
        blocking:
          type: boolean
          default: false
        owner:
          type: string

  runs:
    type: array
    items:
      type: object
      required: [id, task, result]
      properties:
        id:
          type: string
        task:
          type: string
        result:
          type: string
          enum: [success, partial, failed]
        changes:
          type: string
        decisions:
          type: string
        risks:
          type: string
        timestamp:
          type: string
          format: date-time

  compaction:
    type: object
    properties:
      last_compacted:
        type: ["string", "null"]
        format: date-time
      total_runs_compacted:
        type: integer
      summary:
        type: string

  sessions:
    type: array
    description: "Agent session lifecycle entries."
    items:
      type: object
      required: [id, task, status, started]
      properties:
        id:
          type: string
        task:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [started, planned, acting, verified, recorded, failed]
        phase:
          type: string
          enum: [start, plan, act, verify, record, export]
        risk_level:
          type: string
          enum: [low, medium, high]
        guidance_status:
          type: string
          enum: [proceed, action_required]
        started:
          type: string
          format: date-time
        updated:
          type: string
          format: date-time
        ended:
          type: string
          format: date-time
        plan:
          type: array
          items:
            type: string

  verifications:
    type: array
    description: "Reflective verification reports linked to sessions/tasks."
    items:
      type: object
      required: [id, verdict, timestamp]
      properties:
        id:
          type: string
        session_id:
          type: string
        task:
          type: string
        verdict:
          type: string
          enum: [pass, pass_with_risks, fail, needs_clarification]
        summary:
          type: string
        unresolved_questions:
          type: array
          items:
            type: string
        assumptions:
          type: array
          items:
            type: string
        follow_ups:
          type: array
          items:
            type: string
        checks:
          type: array
          items:
            type: object
            required: [name, passed]
            properties:
              name:
                type: string
              passed:
                type: boolean
              details:
                type: string
        evidence_refs:
          type: array
          items:
            type: string
        timestamp:
          type: string
          format: date-time

  context_compaction:
    type: object
    description: "Context pack usage and onboarding-read counters."
    properties:
      sessions_started:
        type: integer
        minimum: 0
      full_reads_completed:
        type: integer
        minimum: 0
      default_pack:
        type: string
        enum: [balanced, standard, minimal, full]
      last_pack_tokens:
        type: integer
        minimum: 0
      last_window_usage:
        type: object
        properties:
          pct_4000:
            type: number
            minimum: 0
          pct_8000:
            type: number
            minimum: 0
          pct_32000:
            type: number
            minimum: 0
          pct_128000:
            type: number
            minimum: 0

  about:
    type: object
    description: "Onboarding acknowledgment state for haxaml_about."
    properties:
      acknowledged_at:
        type: string
        format: date-time
      prompt_version:
        type: string
      haxaml_version:
        type: string

  expect_sync:
    type: object
    description: "Lifecycle sync state for propagating latest recorded acts outcome into expect.yaml."
    properties:
      required:
        type: boolean
        default: false
      pending_run_id:
        type: string
      pending_task:
        type: string
      pending_result:
        type: string
        enum: ["", success, partial, failed]
      pending_recorded_at:
        type: string
        format: date-time
      last_synced_run_id:
        type: string
      last_synced_at:
        type: string
        format: date-time
      last_sync_status:
        type: string
        enum: ["", planned, active, done, skipped, blocked]

  lifecycle_contract:
    type: object
    description: "Deterministic lifecycle contract state for governed MCP flow."
    properties:
      phase:
        type: string
      required_next:
        type: array
        minItems: 1
        items:
          type: string
      active_session_id:
        type: string
      active_task:
        type: string
      last_tool:
        type: string
      last_verification_id:
        type: string
      last_verification_verdict:
        type: string
        enum: ["", pass, pass_with_risks, fail, needs_clarification]
      last_record_run_id:
        type: string
      last_record_result:
        type: string
        enum: ["", success, partial, failed]
      updated_at:
        type: string
        format: date-time
