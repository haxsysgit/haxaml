# acts.yaml JSON Schema — Project Acts (FRAME model: A)
# What has been done, what's active, compressed project memory.
# Version: 0.2.0

$schema: "https://json-schema.org/draft/2020-12/schema"
title: "Haxaml Acts"
description: "Live project state — tasks, runs, decisions, history."
type: object

required:
  - current_phase
  - active_task

properties:

  current_phase:
    type: string
    description: "The project phase currently in progress."

  active_task:
    type: object
    description: "The single task being worked on right now."
    required: [name]
    properties:
      name:
        type: string
      description:
        type: string
      started:
        type: string
        format: date-time
      assignee:
        type: string

  completed_tasks:
    type: array
    items:
      type: object
      required: [name, result]
      properties:
        name:
          type: string
        result:
          type: string
          enum: [success, partial, failed]
        summary:
          type: string
        completed:
          type: string
          format: date-time

  blocked_tasks:
    type: array
    items:
      type: object
      required: [name, reason]
      properties:
        name:
          type: string
        reason:
          type: string
        depends_on:
          type: string

  decisions:
    type: array
    items:
      type: object
      required: [decision, reasoning]
      properties:
        decision:
          type: string
        reasoning:
          type: string
        date:
          type: string
          format: date-time
        reversible:
          type: boolean
          default: true

  unresolved_dependencies:
    type: array
    items:
      type: object
      required: [item]
      properties:
        item:
          type: string
        blocking:
          type: boolean
          default: false
        owner:
          type: string

  runs:
    type: array
    items:
      type: object
      required: [id, task, result]
      properties:
        id:
          type: string
        task:
          type: string
        result:
          type: string
          enum: [success, partial, failed]
        changes:
          type: string
        decisions:
          type: string
        risks:
          type: string
        timestamp:
          type: string
          format: date-time

  compaction:
    type: object
    properties:
      last_compacted:
        type: ["string", "null"]
        format: date-time
      total_runs_compacted:
        type: integer
      summary:
        type: string
