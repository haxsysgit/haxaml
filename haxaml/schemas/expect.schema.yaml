# expect.yaml JSON Schema — Expected Runs (FRAME model: E)
# The forward-looking file: phases, runbook, task sequence, milestones.
# Version: 0.8.0

$schema: "https://json-schema.org/draft/2020-12/schema"
title: "FRAME Expect"
description: "FRAME expect frontmatter. Only fields defined by this schema are valid in this slice."
type: object
additionalProperties: false

required:
  - frame

properties:
  frame:
    description: "FRAME frontmatter. Lets humans and tools identify this file before reading the body."
    allOf:
      - $ref: "./frame.schema.yaml#/$defs/frame_header"
      - type: object
        properties:
          file:
            const: expect
            description: "Identifies this FRAME file as expect.yaml."
          role:
            const: planned_direction
            description: "The job of expect.yaml: planned direction and done checks, not a rigid schedule."
