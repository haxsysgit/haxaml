# facts.yaml JSON Schema — Project Facts (FRAME model: F)
# The stable base truth about what the project is.
# Version: 0.8.0

$schema: "https://json-schema.org/draft/2020-12/schema"
title: "FRAME Facts"
description: "FRAME facts frontmatter. Only fields defined by this schema are valid in this slice."
type: object
additionalProperties: false

required:
  - frame

properties:
  frame:
    description: "FRAME frontmatter. Lets humans and tools identify this file before reading the body."
    allOf:
      - $ref: "./frame.schema.yaml#/$defs/frame_header"
      - type: object
        properties:
          file:
            const: facts
            description: "Identifies this FRAME file as facts.yaml."
          role:
            const: stable_project_truth
            description: "The job of facts.yaml: stable base truth about the project, not opinions or plans."
