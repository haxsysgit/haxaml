# facts.yaml JSON Schema — Project Facts (FRAME model: F)
# The stable base truth about what the project is.
# Version: 0.8.0

$schema: "https://json-schema.org/draft/2020-12/schema"
title: "FRAME Facts"
description: "FRAME facts frontmatter. Only fields defined by this schema are valid in this slice."
type: object
additionalProperties: false

required:
  - frame

properties:

  frame:
    type: object
    description: "FRAME frontmatter. Lets humans and tools identify this file before reading the body."
    additionalProperties: false
    required: [file, schema_version, role, status]
    properties:
      file:
        type: string
        const: facts
        description: "The FRAME file name. Prevents a tool from treating one FRAME file as another."
      schema_version:
        type: string
        const: "0.8.0"
        description: "The schema contract this file claims to follow."
      role:
        type: string
        const: stable_project_truth
        description: "The job of facts.yaml: stable project truth, not activity history or planned work."
      status:
        type: string
        enum: [draft, active, deprecated]
        description: "Whether this file is still being shaped, trusted as active, or kept only for old projects."
      last_reviewed:
        type: ["string", "null"]
        format: date
        description: "Optional date when a human or tool last checked this file for stale truth."
      updated_by:
        type: ["string", "null"]
        description: "Optional human, agent, or tool that last changed this file."
      update_reason:
        type: ["string", "null"]
        description: "Optional short reason for the last change."
