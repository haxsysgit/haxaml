# rules.yaml JSON Schema — Agent Rules (FRAME model: R)
# The rules AI agents must follow when working on this project.
# Version: 0.8.0

$schema: "https://json-schema.org/draft/2020-12/schema"
title: "FRAME Rules"
description: "FRAME rules frontmatter. Only fields defined by this schema are valid in this slice."
type: object
additionalProperties: false

required:
  - frame

properties:
  frame:
    description: "FRAME frontmatter. Lets humans and tools identify this file before reading the body."
    allOf:
      - $ref: "./frame.schema.yaml#/$defs/frame_header"
      - type: object
        properties:
          file:
            const: rules
            description: "Identifies this FRAME file as rules.yaml."
          role:
            const: project_constraints
            description: "The job of rules.yaml: stable constraints that tools and agents should obey."
