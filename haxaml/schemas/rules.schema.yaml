# rules.yaml JSON Schema — Agent Rules (FRAME model: R)
# The rules AI agents must follow when working on this project.
# Version: 0.3.0

$schema: "https://json-schema.org/draft/2020-12/schema"
title: "Haxaml Rules"
description: "Structured agent rules — conventions, boundaries, forbidden actions."
type: object

required:
  - before_task
  - boundaries
  - after_task
  - forbidden

properties:

  governance:
    type: object
    properties:
      system:
        type: string
      version:
        type: string

  agent_profile:
    type: object
    description: "Optional deterministic prompt profile for high-quality exports."
    required: [persona, reasoning_policy, output_contract]
    additionalProperties: false
    properties:
      persona:
        type: object
        required: [role, tone, constraints]
        additionalProperties: false
        properties:
          role:
            type: string
            minLength: 1
          tone:
            type: array
            minItems: 1
            maxItems: 8
            items:
              type: string
              minLength: 1
          constraints:
            type: array
            minItems: 1
            maxItems: 12
            items:
              type: string
              minLength: 1

      reasoning_policy:
        type: object
        required: [private_reasoning, public_rationale, checklist]
        additionalProperties: false
        properties:
          private_reasoning:
            type: string
            minLength: 1
          public_rationale:
            type: string
            minLength: 1
          checklist:
            type: array
            minItems: 1
            items:
              type: string
              minLength: 1
          prohibit_cot_transcript:
            type: boolean
            const: true
            description: "Must stay true so exports avoid explicit chain-of-thought transcript requests."

      output_contract:
        type: object
        required: [required_sections]
        additionalProperties: false
        properties:
          required_sections:
            type: array
            minItems: 1
            maxItems: 12
            items:
              type: string
              minLength: 1
          format_notes:
            type: array
            items:
              type: string
              minLength: 1

      few_shot_examples:
        type: array
        maxItems: 12
        items:
          type: object
          required: [input, output]
          additionalProperties: false
          properties:
            title:
              type: string
            input:
              type: string
              minLength: 1
            output:
              type: string
              minLength: 1

      example_policy:
        type: object
        additionalProperties: false
        properties:
          max_examples:
            type: integer
            minimum: 1
            maximum: 12
          max_input_chars:
            type: integer
            minimum: 64
            maximum: 4000
          max_output_chars:
            type: integer
            minimum: 64
            maximum: 6000
          max_total_chars:
            type: integer
            minimum: 256
            maximum: 12000
          derived_from_acts_max:
            type: integer
            minimum: 0
            maximum: 12
          ordering:
            type: string
            enum: [explicit_then_derived]
          fallback_when_empty:
            type: string
            enum: [render_notice, omit_section]

  before_task:
    type: object
    description: "What the agent must do before starting any task."
    required: [read_first]
    properties:
      read_first:
        type: array
        minItems: 1
        items:
          type: string
        description: "Files the agent must read before any task."
      then_read:
        type: array
        items:
          type: string
      check:
        type: array
        items:
          type: string
        description: "Pre-task validation checks."

  boundaries:
    type: object
    description: "Module ownership and cross-boundary rules."
    required: [rules]
    properties:
      modules:
        type: object
        additionalProperties:
          type: object
          required: [owns, purpose]
          properties:
            owns:
              type: array
              items:
                type: string
            purpose:
              type: string
            touches:
              type: array
              items:
                type: string
      rules:
        type: array
        minItems: 1
        items:
          type: string
        description: "Boundary rules agents must follow."

  while_coding:
    type: object
    properties:
      constraints:
        type: array
        items:
          type: string
      discipline:
        type: array
        items:
          type: string

  after_task:
    type: object
    description: "What the agent must do after completing a task."
    required: [report, update]
    properties:
      report:
        type: array
        minItems: 1
        items:
          type: string
      update:
        type: array
        minItems: 1
        items:
          type: string
      verify:
        type: array
        items:
          type: string

  forbidden:
    type: array
    minItems: 1
    items:
      type: string
    description: "Actions agents must never take."

  escalation:
    type: object
    properties:
      act_independently:
        type: array
        items:
          type: string
      ask_first:
        type: array
        items:
          type: string

additionalProperties: false
