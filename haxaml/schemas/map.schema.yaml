$schema: "https://json-schema.org/draft/2020-12/schema"
title: "FRAME Map"
description: "FRAME map frontmatter. Only fields defined by this schema are valid in this slice."
type: object
additionalProperties: false

required:
  - frame

properties:
  frame:
    description: "FRAME frontmatter. Lets humans and tools identify this file before reading the body."
    allOf:
      - $ref: "./frame.schema.yaml#/$defs/frame_header"
      - type: object
        properties:
          file:
            const: map
            description: "Identifies this FRAME file as map.yaml."
          role:
            const: repo_context_map
            description: "The job of map.yaml: short repo summaries that tell tools where to probably inspect first."
