# Project Rules (FRAME: R) — Generated by Haxaml

governance:
  system: haxaml
  version: "0.7.4"

before_task:
  read_first:
    - .haxaml/facts.yaml
    - .haxaml/rules.yaml
    - .haxaml/acts.yaml
  then_read:
    - .haxaml/expect.yaml
  check:
    - "Confirm the task matches project facts and current state."
    - "Read only source files relevant to the task."

boundaries:
  modules: {}
  rules:
    - "Edit only files relevant to the active task scope."

while_coding:
  constraints:
    - "Keep changes minimal and reversible where possible."
    - "Avoid touching unrelated code or files."
    - "Do not introduce new dependencies without approval."
    - "Do not make assumptions about unstated requirements or context."
    - "Do not write code that isn't readable or maintainable."
  discipline:
    - "Always have a good and clear and simple commenting policy, not just generating code"
    - "Use short, accurate commit messages in plain language."
    - "Do not use commit prefixes like fix:, feat:, refactor:, chore:, or docs:."
    - "Run tests or validation for touched behavior."

after_task:
  report:
    - "Summarize what changed, why, and known risks."
  update:
    - ".haxaml/acts.yaml"
  verify:
    - "Run relevant tests or validation checks."

forbidden:
  - "Do not claim success without verification evidence."

escalation:
  act_independently:
    - "Small scoped implementation and test fixes."
  ask_first:
    - "Architecture changes, destructive data operations, or production-risk actions."

lifecycle:
  onboarding_full_reads: 5
  enforce_verify_before_record: true
  enforce_governed_evidence_on_validate: true
  phases:
    - prebuild
    - start
    - plan
    - context
    - act
    - verify
    - record
    - export

context_policy:
  default_pack: balanced
  max_items_per_section: 5
  max_chars_per_item: 240

memory_policy:
  archive_mode: manual
  max_hot_runs: 5
  max_hot_sessions: 5
  max_hot_verifications: 5
  max_acts_bytes: 16000
  keep_decisions_hot: true

clarification_policy:
  mode: risk_gated_soft_block
  min_task_chars: 16
  high_risk_keywords:
    - migrate
    - delete
    - auth
    - security
    - payment

verification_policy:
  require_checks:
    - understood_task
    - inspected_context
    - changed_right_files
    - risky_or_unrelated_touch
    - followed_rules
    - updated_journal
    - unresolved_logged
    - explained_changes
  allow_pass_with_risks: true

guidance_policy:
  task_type_hints: {}
  safer_path_templates: []
