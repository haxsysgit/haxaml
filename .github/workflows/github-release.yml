name: Create GitHub Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish as a GitHub Release (example: v0.4.5 or v0.6.7b0)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Create or update release entry
    runs-on: ubuntu-latest
    steps:
      - name: Classify release tag
        id: classify
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          if echo "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(a[0-9]+|b[0-9]+|rc[0-9]+)$'; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release from tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          prerelease: ${{ steps.classify.outputs.prerelease }}
          generate_release_notes: true
