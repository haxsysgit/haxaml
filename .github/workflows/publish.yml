name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    name: Build, check, and publish
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Validate tag and package versions
        run: |
          python - <<'PY'
          import os
          from haxaml.versioning import validate_release_versions

          snapshot = validate_release_versions(os.environ.get("GITHUB_REF_NAME", ""))
          print(
              "Version checks passed for "
              f"{snapshot['core_version']} "
              f"(core={snapshot['core_version']}, mcp={snapshot['mcp_version']})."
          )
          PY

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests
        run: uv run pytest -q

      - name: Build Haxaml package
        run: uv build

      - name: Build Haxaml MCP launcher package
        run: uv build --project packages/haxaml-mcp --out-dir packages/haxaml-mcp/dist

      - name: Check package metadata
        run: |
          uv run twine check dist/*
          uv run twine check packages/haxaml-mcp/dist/*

      - name: Publish Haxaml to PyPI
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: uv publish --token "$PYPI_TOKEN" dist/*

      - name: Publish Haxaml MCP launcher to PyPI
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: uv publish --token "$PYPI_TOKEN" packages/haxaml-mcp/dist/*
