name: Build Python Distributions

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build from. Leave blank to build the current ref without release validation."
        required: false
        type: string
      package_target:
        description: "Which package(s) to build"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - core
          - mcp
          - ui

permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: Build and check distributions
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate tag and package versions
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.tag != ''
        run: |
          python - <<'PY'
          import os
          from haxaml.versioning import validate_release_versions

          ref_name = os.environ.get("INPUT_TAG") or os.environ.get("GITHUB_REF_NAME", "")
          snapshot = validate_release_versions(ref_name)
          print(
              "Version checks passed for "
              f"{snapshot['core_version']} "
              f"(core={snapshot['core_version']}, mcp={snapshot['mcp_version']}, ui={snapshot['ui_version']})."
          )
          PY
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --extra dev --extra full

      - name: Clean old build artifacts
        run: rm -rf dist packages/haxaml-mcp/dist packages/haxaml-ui/dist

      - name: Run tests
        run: uv run pytest -q

      - name: Build Haxaml package
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.package_target == 'all' || github.event.inputs.package_target == 'core'
        run: uv build

      - name: Build Haxaml MCP launcher package
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.package_target == 'all' || github.event.inputs.package_target == 'mcp'
        run: uv build --project packages/haxaml-mcp --out-dir packages/haxaml-mcp/dist

      - name: Build Haxaml UI package
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.package_target == 'all' || github.event.inputs.package_target == 'ui'
        run: uv build --project packages/haxaml-ui --out-dir packages/haxaml-ui/dist

      - name: Check Haxaml package metadata
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.package_target == 'all' || github.event.inputs.package_target == 'core'
        run: uv run twine check dist/*

      - name: Check Haxaml MCP launcher package metadata
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.package_target == 'all' || github.event.inputs.package_target == 'mcp'
        run: uv run twine check packages/haxaml-mcp/dist/*

      - name: Check Haxaml UI package metadata
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.package_target == 'all' || github.event.inputs.package_target == 'ui'
        run: uv run twine check packages/haxaml-ui/dist/*

      - name: Check PyPI for existing package versions
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.tag != ''
        id: pypi
        run: |
          python - <<'PY'
          import os
          import tomllib
          import urllib.error
          import urllib.request
          from pathlib import Path

          REPO = Path(".")
          OUTPUT = Path(os.environ["GITHUB_OUTPUT"])

          def read_version(pyproject_path: Path) -> str:
              with pyproject_path.open("rb") as handle:
                  return str(tomllib.load(handle)["project"]["version"])

          def pypi_has_version(package_name: str, version: str) -> bool:
              url = f"https://pypi.org/pypi/{package_name}/{version}/json"
              try:
                  with urllib.request.urlopen(url) as response:
                      return response.status == 200
              except urllib.error.HTTPError as exc:
                  if exc.code == 404:
                      return False
                  raise

          package_versions = {
              "core": ("haxaml", read_version(REPO / "pyproject.toml")),
              "mcp": ("haxaml-mcp", read_version(REPO / "packages" / "haxaml-mcp" / "pyproject.toml")),
              "ui": ("haxaml-ui", read_version(REPO / "packages" / "haxaml-ui" / "pyproject.toml")),
          }

          lines: list[str] = []
          for key, (package_name, version) in package_versions.items():
              exists = pypi_has_version(package_name, version)
              print(f"{package_name} {version}: {'already on PyPI' if exists else 'not on PyPI yet'}")
              lines.append(f"{key}_version={version}\n")
              lines.append(f"{key}_exists={'true' if exists else 'false'}\n")

          with OUTPUT.open("a", encoding="utf-8") as handle:
              handle.writelines(lines)
          PY

      - name: Note skipped publish targets
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.tag != ''
        run: |
          echo "core: ${{ steps.pypi.outputs.core_version }} already_on_pypi=${{ steps.pypi.outputs.core_exists }}"
          echo "mcp:  ${{ steps.pypi.outputs.mcp_version }} already_on_pypi=${{ steps.pypi.outputs.mcp_exists }}"
          echo "ui:   ${{ steps.pypi.outputs.ui_version }} already_on_pypi=${{ steps.pypi.outputs.ui_exists }}"

      - name: Publish Haxaml MCP launcher package
        if: startsWith(github.ref, 'refs/tags/v') && steps.pypi.outputs.mcp_exists != 'true'
        run: uv publish packages/haxaml-mcp/dist/*
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

      - name: Publish Haxaml UI package
        if: startsWith(github.ref, 'refs/tags/v') && steps.pypi.outputs.ui_exists != 'true'
        run: uv publish packages/haxaml-ui/dist/*
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

      - name: Publish Haxaml package
        if: startsWith(github.ref, 'refs/tags/v') && steps.pypi.outputs.core_exists != 'true'
        run: uv publish dist/*
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
